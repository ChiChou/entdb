name: Build and Deploy

on:
  push:
    branches: [main]

  repository_dispatch:
    types: [data-updated]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.configure-pages.outcome == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show dispatch context
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Triggered by repository_dispatch"
          echo "event_type=${{ github.event.action }}"
          echo "source_repo=${{ github.event.client_payload.source_repo }}"
          echo "source_sha=${{ github.event.client_payload.source_sha }}"
          echo "source_ref=${{ github.event.client_payload.source_ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        id: configure-pages
        continue-on-error: true
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.configure-pages.outputs.base_path || '' }}

      - name: Download latest data release
        run: |
          curl -sL https://api.github.com/repos/ChiChou/entdb-data/releases/latest \
            | jq -r '.assets[] | select(.name == "data.tar.gz") | .browser_download_url' \
            | xargs -r curl -L -o data.tar.gz
          mkdir -p out/data
          tar -xzf data.tar.gz -C out/data

      - name: Download SQLite database
        run: |
          curl -sL https://api.github.com/repos/ChiChou/entdb-data/releases/latest \
            | jq -r '.assets[] | select(.name == "ent.db") | .browser_download_url' \
            | xargs -r curl -L -o out/data/ent.db

      - name: Upload artifact
        if: steps.configure-pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    if: >-
      needs.build.outputs.pages_ready == 'true' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      github.event_name == 'repository_dispatch')

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
